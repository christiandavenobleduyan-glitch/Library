<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>City College of Davao Library</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #eefdf3;
      --panel: #ffffff;
      --ink: #1e293b;
      --muted: #64748b;
      --line: #e2e8f0;
      --sky: #16a34a;
      --sky2: #22c55e;
      --green-deep: #064e3b;
      --green-mid: #15803d;
      --green-soft: #dcfce7;
      --nav: #052e1f;
      --nav2: #0f5132;
      --red: #dc2626;
      --green: #059669;
      --amber: #d97706;
    }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, .22), transparent 34%),
        linear-gradient(135deg, #f0fdf4 0%, #dcfce7 42%, #ecfdf5 100%);
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: url("city-college-davao-removebg-preview.png") center / min(54vw, 999px) auto no-repeat;
      opacity: .07;
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    .login-shell, .app { position: relative; z-index: 1; }
    .login-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .login-card {
      width: min(100%, 440px);
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(240,253,244,.96));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, .12);
    }
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
      margin-bottom: 26px;
    }
    .logo {
      width: 300px;
      height: 300px;
      border-radius: 100px;
      background: transparent;
      display: grid;
      place-items: center;
      overflow: hidden;
      box-shadow: 0 12px 28px rgba(22, 163, 74, .28);
    }
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transform: scale(1.08);
      transform-origin: center;
    }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 28px; line-height: 1.1; }
    .subtle { color: var(--muted); }
    .field { margin-top: 14px; }
    label { display: block; font-size: 14px; font-weight: 650; margin-bottom: 7px; color: #334155; }
    input, select {
      width: 100%;
      height: 42px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 0 12px;
      color: var(--ink);
      background: white;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--sky2); box-shadow: 0 0 0 3px rgba(34, 197, 94, .16); }
    .primary {
      border: 0;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--green-mid), var(--sky2));
      color: white;
      font-weight: 700;
      min-height: 42px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .primary:hover { background: linear-gradient(135deg, #166534, #16a34a); }
    .secondary {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: white;
      color: #334155;
      font-weight: 650;
      min-height: 40px;
      padding: 0 14px;
    }
    .login-card .primary { width: 100%; margin-top: 18px; }
    .error {
      display: none;
      margin-bottom: 14px;
      border: 1px solid #fecaca;
      background: #fef2f2;
      color: #b91c1c;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
    }
    .demo { border-top: 1px solid var(--line); margin-top: 24px; padding-top: 20px; }
    .demo-title { text-align: center; font-size: 12px; color: var(--muted); font-weight: 800; margin-bottom: 10px; }
    .demo-grid { display: grid; gap: 8px; }
    .demo-btn {
      border: 0;
      border-radius: 10px;
      padding: 11px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 700;
    }
    .demo-btn span:last-child { font-size: 12px; padding: 3px 8px; border-radius: 999px; background: rgba(255,255,255,.6); }
    .admin { color: #991b1b; background: #fee2e2; }
    .librarian { color: #075985; background: #e0f2fe; }
    .member { color: #065f46; background: #d1fae5; }
    .app { min-height: 100vh; display: none; }
    .app.logged { display: flex; }
    .sidebar {
      width: 264px;
      min-height: 100vh;
      background: linear-gradient(180deg, var(--green-deep), #052e1f 58%, #031b13);
      color: white;
      display: flex;
      flex-direction: column;
      position: fixed;
      inset: 0 auto 0 0;
    }
    .side-head, .side-user { padding: 16px; border-bottom: 1px solid #334155; }
    .side-head { display: flex; align-items: center; gap: 12px; }
    .mini-logo {
      width: 100px;
      height: 100px;
      border-radius: 999px;
      background: transparent;
      display: grid;
      place-items: center;
      overflow: hidden;
      flex: 0 0 auto;
    }
    .mini-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transform: scale(1.08);
      transform-origin: center;
    }
    .nav { flex: 1; overflow-y: auto; padding: 14px 8px; }
    .nav button {
      width: 100%;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: #cbd5e1;
      min-height: 40px;
      padding: 9px 11px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      margin: 2px 0;
    }
    .nav button:hover, .nav button.open { background: var(--nav2); color: white; }
    .nav button.active { background: linear-gradient(135deg, var(--green-mid), var(--sky2)); color: white; }
    .nav .child { padding-left: 22px; }
    .nav .chev { margin-left: auto; }
    .side-user { border-top: 1px solid #334155; border-bottom: 0; }
    .user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--green-mid), var(--sky2));
      color: white;
      display: grid;
      place-items: center;
      font-weight: 800;
      flex: 0 0 auto;
    }
    .badge { display: inline-flex; border-radius: 999px; padding: 3px 8px; font-size: 12px; font-weight: 800; }
    .badge.red { background: #fee2e2; color: #b91c1c; }
    .badge.blue { background: #e0f2fe; color: #0369a1; }
    .badge.green { background: #d1fae5; color: #047857; }
    .side-actions { display: flex; gap: 8px; }
    .side-actions button {
      flex: 1;
      border: 0;
      border-radius: 9px;
      min-height: 36px;
      color: white;
      background: #334155;
      font-size: 12px;
      font-weight: 750;
    }
    .side-actions .logout { background: var(--red); }
    main {
      margin-left: 264px;
      padding: 24px;
      width: calc(100% - 264px);
    }
    .page-head { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 22px; }
    .page-head h1 { font-size: 26px; }
    .grid { display: grid; gap: 16px; }
    .stats { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .quick { grid-template-columns: repeat(3, minmax(0, 1fr)); margin-top: 16px; }
    .two { grid-template-columns: repeat(2, minmax(0, 1fr)); margin-top: 24px; }
    .card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, .04);
    }
    .stat-card { padding: 20px; display: flex; align-items: center; justify-content: space-between; }
    .stat-value { font-size: 32px; font-weight: 850; margin-top: 4px; }
    .icon-box { width: 48px; height: 48px; border-radius: 10px; display: grid; place-items: center; color: white; font-size: 22px; }
    .quick .card { padding: 16px; display: flex; align-items: center; gap: 14px; background: #f8fafc; }
    .quick .icon-box { background: white; color: #475569; border: 1px solid var(--line); width: 42px; height: 42px; }
    .card-title { padding: 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; font-weight: 800; }
    .list-row { padding: 15px 16px; border-bottom: 1px solid #f1f5f9; display: flex; gap: 12px; align-items: flex-start; }
    .list-row:last-child { border-bottom: 0; }
    .pill { display: inline-flex; align-items: center; border-radius: 999px; padding: 4px 9px; font-size: 12px; font-weight: 800; white-space: nowrap; }
    .filters { padding: 16px; margin-bottom: 16px; }
    .filter-row { display: grid; grid-template-columns: 1fr 180px 190px; gap: 12px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 850px; }
    th { background: #f8fafc; color: #475569; font-size: 13px; text-align: left; padding: 13px 16px; border-bottom: 1px solid var(--line); }
    td { padding: 13px 16px; border-bottom: 1px solid #f1f5f9; font-size: 14px; vertical-align: middle; }
    tr:hover td { background: #f8fafc; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .actions { display: flex; justify-content: flex-end; gap: 6px; }
    .icon-btn {
      min-width: 34px;
      height: 34px;
      padding: 0 8px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #64748b;
    }
    .icon-btn:hover { background: #f1f5f9; color: #334155; }
    .empty { padding: 36px; text-align: center; color: var(--muted); }
    .count { margin-top: 12px; font-size: 14px; color: var(--muted); }
    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, .58);
      padding: 16px;
      z-index: 20;
    }
    .dialog {
      width: min(100%, 720px);
      max-height: 90vh;
      overflow-y: auto;
      background: white;
      border-radius: 14px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .28);
    }
    .dialog.small { width: min(100%, 560px); }
    .dialog-head, .dialog-foot { padding: 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .dialog-foot { border-top: 1px solid var(--line); border-bottom: 0; justify-content: flex-end; }
    .dialog-body { padding: 16px; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 15px; }
    .coming { padding: 56px 24px; text-align: center; }
    .coming-icon {
      width: 76px;
      height: 76px;
      margin: 0 auto 16px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #f1f5f9;
      color: #94a3b8;
      font-size: 34px;
    }
    @media (max-width: 980px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .two, .quick { grid-template-columns: 1fr; }
    }
    @media (max-width: 760px) {
      .app { display: none; }
      .sidebar {
        position: static;
        width: 100%;
        min-height: auto;
      }
      .app.logged { display: block; }
      main { margin-left: 0; width: 100%; padding: 16px; }
      .side-head { position: sticky; top: 0; z-index: 5; background: var(--nav); }
      .nav { max-height: 320px; }
      .page-head { align-items: flex-start; flex-direction: column; }
      .filter-row, .form-grid, .detail-grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr; }
      .login-card { padding: 24px; }
    }
  </style>
</head>
<body>
  <section id="login" class="login-shell">
    <div class="login-card">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <img src="city-college-davao-removebg-preview.png" alt="">
        </div>
        <div>
          <h1>City College of Davao Library</h1>
          <p class="subtle">Library Management System</p>
        </div>
      </div>
      <div id="loginError" class="error">Invalid email or password. Please try again.</div>
      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" value="admin@library.edu" autocomplete="username">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" value="admin123" autocomplete="current-password">
        </div>
        <button class="primary" type="submit">Sign In</button>
      </form>
      <div class="demo">
        <div class="demo-title">DEMO ACCOUNTS</div>
        <div class="demo-grid">
          <button class="demo-btn admin" data-login="admin@library.edu|admin123"><span>Admin Account</span><span>Full Access</span></button>
          <button class="demo-btn librarian" data-login="librarian@library.edu|lib123"><span>Librarian Account</span><span>Standard</span></button>
          <button class="demo-btn member" data-login="member@library.edu|mem123"><span>Member Account</span><span>Limited</span></button>
        </div>
      </div>
    </div>
  </section>

  <section id="app" class="app">
    <aside class="sidebar">
      <div class="side-head">
        <div class="mini-logo" aria-hidden="true"><img src="city-college-davao-logo-clean.png" alt=""></div>
        <div>
          <h2 style="font-size:16px;line-height:1.15">City College of Davao Library</h2>
          <p class="subtle" style="font-size:12px;color:#94a3b8">Management System</p>
        </div>
      </div>
      <nav id="nav" class="nav"></nav>
      <div class="side-user">
        <div class="user-row">
          <div id="avatar" class="avatar">A</div>
          <div style="min-width:0">
            <div id="userName" style="font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Admin User</div>
            <span id="roleBadge" class="badge red">Admin</span>
          </div>
        </div>
        <div class="side-actions">
          <button id="settingsBtn">Settings</button>
          <button id="logoutBtn" class="logout">Logout</button>
        </div>
      </div>
    </aside>
    <main id="main"></main>
  </section>

      addBarcodeHistory({ ...book, id:bookId }, action, code);
      activities.unshift({ id:id(), type:"add", description:`${action} barcode "${code}" for "${book.title}"`, user:currentUser.name, timestamp:new Date().toISOString() });

    function upsertVerification(bookId, physicalStatus) {
      const record = { bookId, physicalStatus, verificationDate:new Date().toISOString(), verifiedBy:currentUser.name };
      const exists = verificationRecords.some(v => v.bookId === bookId);
      verificationRecords = exists ? verificationRecords.map(v => v.bookId === bookId ? record : v) : [record, ...verificationRecords];
    }

    function openScanStock(book = null) {
      $("#viewModal").innerHTML = `<div class="dialog small">

          <div class="dialog-body">

            <div class="field"><label>Physical Status</label><select name="physicalStatus">${["available","borrowed","lost","damaged"].map(s => `<option value="${s}" ${book && inventoryStatus(book.status) === s ? "selected" : ""}>${statusLabel(s)}</option>`).join("")}</select></div>
            <div id="scanStockResult" class="subtle" style="margin-top:12px"></div>
          </div>
          <div class="dialog-foot"><button class="secondary" type="button" data-close="viewModal">Close</button><button class="primary" type="submit">Save Scan</button></div>
        </form>
      </div>`;

        const data = Object.fromEntries(new FormData(e.currentTarget));

          $("#scanStockResult").innerHTML = `<strong style="color:#b91c1c">No matching barcode found.</strong>`;

    function compareStock() {
      const rows = books.map(b => {
        const record = verificationRecord(b);
        const database = inventoryStatus(b.status);
        const physical = record.physicalStatus || "unverified";
        const match = database === physical;
        return { book:b, database, physical, match };
      });
      $("#viewModal").innerHTML = `<div class="dialog">
        <div class="dialog-head"><h2>Database vs Physical Inventory</h2><button class="icon-btn" data-close="viewModal">X</button></div>
        <div class="dialog-body">
          <div class="table-wrap"><table>
            <thead><tr><th>Barcode</th><th>Book Title</th><th>Database</th><th>Physical</th><th>Result</th></tr></thead>
            <tbody>${rows.map(r => `<tr>
              <td class="mono">${esc(r.book.barcode || "-")}</td>
              <td>${esc(r.book.title)}</td>
              <td>${esc(statusLabel(r.database))}</td>
              <td>${esc(r.physical === "unverified" ? "Unverified" : statusLabel(r.physical))}</td>
              <td><span class="pill" style="${r.match ? "background:#d1fae5;color:#047857" : "background:#fee2e2;color:#b91c1c"}">${r.match ? "Match" : "Mismatch"}</span></td>
            </tr>`).join("")}</tbody>
          </table></div>
        </div>
        <div class="dialog-foot"><button class="secondary" data-close="viewModal">Close</button></div>
      </div>`;
      $("#viewModal").style.display = "flex";
    }

    function generateVerificationReport() {
      const verified = verificationRecords.length;
      const missing = verificationRecords.filter(v => v.physicalStatus === "lost").length;
      const damaged = verificationRecords.filter(v => v.physicalStatus === "damaged").length;
      const mismatches = books.filter(b => {
        const record = verificationRecord(b);
        return record.physicalStatus && record.physicalStatus !== inventoryStatus(b.status);
      });
      $("#viewModal").innerHTML = `<div class="dialog small">
        <div class="dialog-head"><h2>Verification Report</h2><button class="icon-btn" data-close="viewModal">X</button></div>
        <div class="dialog-body">
          <div class="detail-grid">
            <div><p class="subtle" style="font-size:12px">Database Items</p><strong>${books.length}</strong></div>
            <div><p class="subtle" style="font-size:12px">Verified Items</p><strong>${verified}</strong></div>
            <div><p class="subtle" style="font-size:12px">Physical Missing</p><strong>${missing}</strong></div>
            <div><p class="subtle" style="font-size:12px">Physical Damaged</p><strong>${damaged}</strong></div>
          </div>
          <h3 style="font-size:16px;margin-top:18px">Mismatches</h3>
          ${mismatches.length ? mismatches.map(b => {
            const record = verificationRecord(b);
            return `<div class="list-row"><div><strong>${esc(b.title)}</strong><p class="subtle">Database: ${esc(inventoryStatusLabel(b.status))} | Physical: ${esc(statusLabel(record.physicalStatus))}</p></div></div>`;
          }).join("") : `<div class="empty">No mismatches found.</div>`}
        </div>
        <div class="dialog-foot"><button class="secondary" data-close="viewModal">Close</button><button class="primary" onclick="window.print()">Print Report</button></div>
      </div>`;
      $("#viewModal").style.display = "flex";
    }

    function markMissingItem(book) {
      if (!confirm(`Mark "${book.title}" as missing?`)) return;
      upsertVerification(book.id, "lost");
      books = books.map(b => b.id === book.id ? { ...b, status:"missing", lastUpdated:new Date().toISOString() } : b);
      addMovementHistory(book, book.location || "-", "Missing Review", "Marked Missing");
      renderPage();
    }

    function upsertDamageRecord(bookId, data) {
      const existing = damagedRecords.find(d => d.bookId === bookId && !d.archived);
      const record = {
        bookId,
        description:data.description || existing?.description || "",
        dateReported:existing?.dateReported || new Date().toISOString(),
        reportedBy:existing?.reportedBy || currentUser.name,
        repairStatus:data.repairStatus || existing?.repairStatus || "Minor Damage",
        photoNote:data.photoNote || existing?.photoNote || "",
        archived:false
      };
      damagedRecords = existing
        ? damagedRecords.map(d => d === existing ? record : d)
        : [record, ...damagedRecords];
      books = books.map(b => b.id === bookId ? { ...b, status:"damaged", lastUpdated:new Date().toISOString() } : b);
    }

    function openReportDamage(book = null) {
      const selected = book || books[0];
      $("#viewModal").innerHTML = `<div class="dialog small">
        <div class="dialog-head"><h2>Report Damage</h2><button class="icon-btn" data-close="viewModal">X</button></div>
        <form id="damageForm">
          <div class="dialog-body">

            <div class="field"><label>Damage Description</label><input name="description" placeholder="Describe the damage" required></div>
            <div class="field"><label>Repair Status</label><select name="repairStatus">${["Minor Damage","For Repair","Beyond Repair","Replaced"].map(s => `<option value="${s}">${s}</option>`).join("")}</select></div>

        upsertDamageRecord(data.bookId, data);

    function openDamagePhoto(book) {
      const record = damagedRecord(book);
      $("#viewModal").innerHTML = `<div class="dialog small">
        <div class="dialog-head"><h2>Upload Damage Photo</h2><button class="icon-btn" data-close="viewModal">X</button></div>
        <form id="damagePhotoForm">
          <div class="dialog-body">
            <p style="font-weight:800">${esc(book.title)}</p>
            <p class="subtle" style="margin-bottom:14px">Standalone HTML stores a photo note instead of an uploaded file.</p>
            <div class="field"><label>Damage Photo Note</label><input name="photoNote" value="${esc(record.photoNote || "")}" placeholder="Example: photo saved as IMG_2041.jpg"></div>

          <div class="dialog-foot"><button class="secondary" type="button" data-close="viewModal">Cancel</button><button class="primary" type="submit">Save Photo Note</button></div>
        </form>
      </div>`;

        e.preventDefault();
        upsertDamageRecord(book.id, Object.fromEntries(new FormData(e.currentTarget)));
        closeModal("viewModal");

    function setDamageStatus(book, repairStatus, movementAction) {
      upsertDamageRecord(book.id, { repairStatus });
      addMovementHistory(book, book.location || "-", repairStatus, movementAction);
      renderPage();
    }

    function archiveDamagedItem(book) {
      if (!confirm(`Archive damaged record for "${book.title}"?`)) return;
      const record = damagedRecord(book);
      damagedRecords = damagedRecords.map(d => d.bookId === book.id && !d.archived ? { ...d, archived:true } : d);
      books = books.map(b => b.id === book.id ? { ...b, status:"available", lastUpdated:new Date().toISOString() } : b);
      addMovementHistory(book, record.repairStatus || "Damaged", "Archived", "Archived Damaged Item");
      renderPage();
    }

    function processBorrow(form) {
      const data = Object.fromEntries(new FormData(form));
      const member = memberById(data.memberId);
      const book = books.find(b => b.id === data.bookId);
      if (!member || !book) return;
      if (member.status !== "active") {
        alert("This member is inactive and cannot borrow books.");
        return;
      }
      if (book.availableCopies <= 0 || ["missing","damaged"].includes(book.status)) {
        alert("This book is not available for borrowing.");
        return;
      }
      const nextCopies = Math.max(0, book.availableCopies - 1);
      books = books.map(b => b.id === book.id ? {
        ...b,
        status:"borrowed",
        availableCopies:nextCopies,
        borrower:member.name,
        borrowerId:member.id,
        borrowDate:data.borrowDate,
        dueDate:data.dueDate,
        lastUpdated:new Date().toISOString(),
        remarks:data.remarks
      } : b);
      activities.unshift({
        id:id(),
        type:"borrow",
        description:`Borrowed "${book.title}" (${data.transactionNumber})`,
        user:member.name,
        timestamp:new Date().toISOString(),
        bookTitle:book.title
      });
      addMovementHistory(book, book.location || "-", `Checked out to ${member.name}`, "Borrowed");
      alert("Borrow transaction saved.");
      renderPage();
    }

    function verifyAccessionNumber(number) {
      const clean = String(number || "").trim().toLowerCase();
      const book = books.find(b => accession(b).toLowerCase() === clean);
      accessionLookup = { number, bookId:book ? book.id : null, verified:Boolean(book) };
      if (!book) alert("No book copy found for that accession number.");
      renderAccessionUpdate();
    }

    function markAccessionAvailable() {
      updateAccessionStatus("available");
    }

    function updateAccessionStatus(nextStatus) {
      const book = books.find(b => b.id === accessionLookup.bookId);
      if (!book) return;
      const previousStatus = inventoryStatusLabel(book.status);
      const normalizedStatus = nextStatus === "missing" ? "missing" : nextStatus;
      const newStatusLabel = inventoryStatusLabel(normalizedStatus);
      books = books.map(b => b.id === book.id ? {
        ...b,
        status:normalizedStatus,
        availableCopies:normalizedStatus === "available" ? Math.max(1, b.availableCopies || 0) : 0,
        borrower:normalizedStatus === "borrowed" ? (b.borrower || "Recorded borrower") : "",
        borrowerId:normalizedStatus === "borrowed" ? b.borrowerId : "",
        borrowDate:normalizedStatus === "borrowed" ? (b.borrowDate || isoDate()) : "",
        dueDate:normalizedStatus === "borrowed" ? (b.dueDate || addDays(new Date(), 14)) : "",
        lastUpdated:new Date().toISOString()
      } : b);
      accessionHistory.unshift({
        accessionNumber:accession(book),
        title:book.title,
        previousStatus,
        newStatus:newStatusLabel,
        dateUpdated:new Date().toISOString(),
        updatedBy:currentUser.name
      });
      activities.unshift({
        id:id(),
        type:"add",
        description:`Marked "${book.title}" ${newStatusLabel} via accession ${accession(book)}`,
        user:currentUser.name,
        timestamp:new Date().toISOString(),
        bookTitle:book.title
      });
      addMovementHistory(book, previousStatus, newStatusLabel, "Accession Status Updated");
      alert(`Book copy marked ${newStatusLabel}.`);
      renderPage();
    }

    function exportInventoryExcel() {
      const rows = filteredBooks();
      const headers = ["Barcode", "Accession Number", "Book Title", "Author", "Category", "ISBN", "Shelf Location", "Quantity", "Available Copies", "Status", "Date Added"];
      const body = rows.map(b => [
        b.barcode || "-",
        accession(b),
        b.title,
        b.author,
        b.category,
        b.isbn,
        b.location || "-",
        b.copies,
        b.availableCopies,
        inventoryStatusLabel(b.status),
        fmt(b.addedDate)
      ]);
      const table = `<table><thead><tr>${headers.map(h => `<th>${esc(h)}</th>`).join("")}</tr></thead><tbody>${body.map(row => `<tr>${row.map(cell => `<td>${esc(cell)}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
      const blob = new Blob([`\ufeff${table}`], { type:"application/vnd.ms-excel" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `inventory-list-${isoDate()}.xls`;
      document.body.appendChild(link);
      link.click();
      URL.revokeObjectURL(link.href);
      link.remove();
    }

    function closeModal(id) { $("#" + id).style.display = "none"; }

    document.addEventListener("click", (e) => {
      const t = e.target.closest("button");
      if (!t) return;
      if (t.dataset.login) {
        const [email, password] = t.dataset.login.split("|");
        login(email, password);
      }
      if (t.dataset.page) {
        if (t.dataset.page !== currentPage) filters.status = "all";
        currentPage = t.dataset.page;
        renderPage();
      }
      if (t.dataset.toggle) {
        expanded.has(t.dataset.toggle) ? expanded.delete(t.dataset.toggle) : expanded.add(t.dataset.toggle);
        renderNav();
      }
      if (t.id === "logoutBtn") logout();
      if (t.id === "settingsBtn") { currentPage = "settings"; renderPage(); }
      if (t.id === "addBook" || t.id === "addItem") openBookForm();
      if (t.id === "generateBarcode") openGenerateBarcode();
      if (t.id === "scanBarcode") openScanBarcode();
      if (t.id === "scanStock") openScanStock();
      if (t.id === "compareStock") compareStock();
      if (t.id === "verificationReport") generateVerificationReport();
      if (t.id === "reportDamage") openReportDamage();
      if (t.id === "markAccessionAvailable") markAccessionAvailable();
      if (t.id === "markAccessionStatus") updateAccessionStatus($("#accessionStatusOption").value);
      if (t.id === "clearAccessionLookup") {
        accessionLookup = { number:"", bookId:null, verified:false };
        renderAccessionUpdate();
      }
      if (t.id === "cancelAccessionLookup") {
        accessionLookup = { number:"", bookId:null, verified:false };
        currentPage = "inventory";
        renderPage();
      }
      if (t.dataset.edit) openBookForm(books.find(b => b.id === t.dataset.edit));
      if (t.dataset.view) viewBook(books.find(b => b.id === t.dataset.view));
      if (t.dataset.printBarcode) printBarcode(books.find(b => b.id === t.dataset.printBarcode));
      if (t.dataset.reassignBarcode) openReassignBarcode(books.find(b => b.id === t.dataset.reassignBarcode));
      if (t.dataset.barcodeHistory) viewBarcodeHistory(books.find(b => b.id === t.dataset.barcodeHistory));
      if (t.dataset.trackLocation) openTrackLocation(books.find(b => b.id === t.dataset.trackLocation));
      if (t.dataset.borrowHistory) viewBorrowingHistory(books.find(b => b.id === t.dataset.borrowHistory));
      if (t.dataset.movementHistory) viewMovementHistory(books.find(b => b.id === t.dataset.movementHistory));
      if (t.dataset.updateStatus) openUpdateAssetStatus(books.find(b => b.id === t.dataset.updateStatus));
      if (t.dataset.scanStock) openScanStock(books.find(b => b.id === t.dataset.scanStock));
      if (t.dataset.markMissing) markMissingItem(books.find(b => b.id === t.dataset.markMissing));
      if (t.dataset.damagePhoto) openDamagePhoto(books.find(b => b.id === t.dataset.damagePhoto));
      if (t.dataset.markRepair) setDamageStatus(books.find(b => b.id === t.dataset.markRepair), "For Repair", "Marked for Repair");
      if (t.dataset.markReplace) setDamageStatus(books.find(b => b.id === t.dataset.markReplace), "Replaced", "Marked for Replacement");
      if (t.dataset.archiveDamage) archiveDamagedItem(books.find(b => b.id === t.dataset.archiveDamage));
      if (t.dataset.saveLocation) {
        const book = books.find(b => b.id === t.dataset.saveLocation);
        const location = $("#newAssetLocation").value;
        if (book) {
          books = books.map(b => b.id === book.id ? { ...b, location, lastUpdated:new Date().toISOString() } : b);
          addMovementHistory(book, book.location || "-", location || "-", "Location Updated");
          closeModal("viewModal");
          renderPage();
        }
      }
      if (t.dataset.delete && confirm("Are you sure you want to delete this book?")) {
        const book = books.find(b => b.id === t.dataset.delete);
        books = books.filter(b => b.id !== t.dataset.delete);
        if (book) activities.unshift({ id:id(), type:"delete", description:`Deleted book "${book.title}"`, user:currentUser.name, timestamp:new Date().toISOString() });
        renderPage();
      }
      if (t.dataset.close) closeModal(t.dataset.close);
    });

    document.addEventListener("input", (e) => {
      if (e.target.id === "searchBooks") {
        filters.search = e.target.value;
        renderBooks();
        $("#searchBooks").focus();
        $("#searchBooks").setSelectionRange(filters.search.length, filters.search.length);
      }
      if (e.target.id === "searchInventory") {
        filters.search = e.target.value;
        renderInventory();
        $("#searchInventory").focus();
        $("#searchInventory").setSelectionRange(filters.search.length, filters.search.length);
      }
      if (e.target.id === "searchBarcode") {
        filters.search = e.target.value;
        renderBarcodeManagement();
        $("#searchBarcode").focus();
        $("#searchBarcode").setSelectionRange(filters.search.length, filters.search.length);
      }
      if (e.target.id === "searchAssets") {
        filters.search = e.target.value;
        renderAssetTracking();
        $("#searchAssets").focus();
        $("#searchAssets").setSelectionRange(filters.search.length, filters.search.length);
      }
      if (e.target.id === "searchVerification") {
        filters.search = e.target.value;
        renderStockVerification();
        $("#searchVerification").focus();
        $("#searchVerification").setSelectionRange(filters.search.length, filters.search.length);
      }
      if (e.target.id === "searchDamaged") {
        filters.search = e.target.value;
        renderDamagedItems();
        $("#searchDamaged").focus();
        $("#searchDamaged").setSelectionRange(filters.search.length, filters.search.length);
      }
      if (e.target.id === "accessionNumberLookup") accessionLookup.number = e.target.value;
    });
    document.addEventListener("change", (e) => {
      if (e.target.id === "borrowMemberSelect") {
        borrowSelection.memberId = e.target.value;
        renderBorrowBooks();
      }
      if (e.target.id === "borrowBookSelect") {
        borrowSelection.bookId = e.target.value;
        renderBorrowBooks();
      }
      if (e.target.id === "statusFilter") { filters.status = e.target.value; renderBooks(); }
      if (e.target.id === "categoryFilter") { filters.category = e.target.value; renderBooks(); }
      if (e.target.id === "inventoryStatusFilter") { filters.status = e.target.value; renderInventory(); }
      if (e.target.id === "inventoryCategoryFilter") { filters.category = e.target.value; renderInventory(); }
      if (e.target.id === "barcodeStatusFilter") { filters.status = e.target.value; renderBarcodeManagement(); }
      if (e.target.id === "barcodeCategoryFilter") { filters.category = e.target.value; renderBarcodeManagement(); }
      if (e.target.id === "assetStatusFilter") { filters.status = e.target.value; renderAssetTracking(); }
      if (e.target.id === "assetCategoryFilter") { filters.category = e.target.value; renderAssetTracking(); }
      if (e.target.id === "verificationStatusFilter") { filters.status = e.target.value; renderStockVerification(); }
      if (e.target.id === "verificationCategoryFilter") { filters.category = e.target.value; renderStockVerification(); }
      if (e.target.id === "damageStatusFilter") { filters.status = e.target.value; renderDamagedItems(); }
      if (e.target.id === "damageCategoryFilter") { filters.category = e.target.value; renderDamagedItems(); }
    });
    $("#loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      login($("#email").value, $("#password").value);
    });
    document.addEventListener("submit", (e) => {
      if (e.target.id === "borrowBooksForm") {
        e.preventDefault();
        processBorrow(e.target);
      }
      if (e.target.id === "accessionVerifyForm") {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target));
        verifyAccessionNumber(data.accessionNumber);
      }
    });
  </script>
</body>
</html>
